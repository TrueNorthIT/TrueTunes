name: Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - name: Test with coverage
        run: >
          npm run test:run --
          --reporter=default
          --reporter=junit
          --outputFile.junit=./junit.xml
          --coverage

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Vitest Tests
          path: renderer/junit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Publish coverage report
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          json-summary-path: renderer/coverage/coverage-summary.json
          json-summary-compare-path: renderer/coverage/coverage-summary.json

  version:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      sha: ${{ steps.push.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit and push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  publish:
    needs: version
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: electron:publish:win
          - os: macos-latest
            script: electron:publish:mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPINSIGHTS_CONNECTION_STRING: ${{ secrets.APPINSIGHTS_CONNECTION_STRING }}
          VITE_GITHUB_PAT: ${{ secrets.VITE_GITHUB_PAT }}
