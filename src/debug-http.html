<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HTTP Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      background: #0e0e0e;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    #toolbar button {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #d4d4d4;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }
    #toolbar button:hover { background: #333; }
    #filter {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #d4d4d4;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }
    #filter:focus { border-color: #555; }
    #count { color: #666; font-size: 11px; white-space: nowrap; }

    /* ── Main split ──────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── List panel ──────────────────────────────────────────────────────── */
    #list-panel {
      width: 360px;
      flex-shrink: 0;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #list-hdr {
      display: grid;
      grid-template-columns: 58px 1fr 44px 56px;
      gap: 4px;
      padding: 4px 8px;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      color: #444;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    #list-hdr span:nth-child(3),
    #list-hdr span:nth-child(4) { text-align: right; }
    #list {
      flex: 1;
      overflow-y: auto;
    }
    .req-row {
      display: grid;
      grid-template-columns: 58px 1fr 44px 56px;
      gap: 4px;
      padding: 5px 8px;
      border-bottom: 1px solid #171717;
      cursor: pointer;
      align-items: center;
      transition: background 0.08s;
    }
    .req-row:hover { background: #161616; }
    .req-row.selected { background: #0d2035; }
    .req-row.hidden { display: none; }
    .mbadge {
      font-size: 10px;
      font-weight: bold;
      padding: 2px 4px;
      border-radius: 3px;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .m-GET    { background: #0d2a3a; color: #4ec9b0; }
    .m-POST   { background: #0d2e0d; color: #6db76d; }
    .m-DELETE { background: #2e0d0d; color: #e06c75; }
    .m-PATCH  { background: #2a1e00; color: #d4a84b; }
    .row-op {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #bbb;
      font-size: 11px;
    }
    .row-status { text-align: right; font-size: 11px; font-weight: bold; }
    .row-dur    { text-align: right; color: #444; font-size: 10px; }
    .s-pending { color: #444; }
    .s-2xx { color: #6db76d; }
    .s-3xx { color: #d4a84b; }
    .s-4xx, .s-5xx, .s-err { color: #e06c75; }

    /* ── Detail panel ────────────────────────────────────────────────────── */
    #detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #detail-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a2a2a;
      font-size: 14px;
      letter-spacing: 1px;
    }
    #detail-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Detail top bar */
    #detail-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
      min-width: 0;
    }
    #dbar-method { flex-shrink: 0; }
    #dbar-url {
      flex: 1;
      color: #9cdcfe;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
    }
    #dbar-status { flex-shrink: 0; font-size: 11px; white-space: nowrap; }
    #edit-resend-btn {
      flex-shrink: 0;
      background: #0d2a3a;
      border: 1px solid #1a4a5a;
      color: #4ec9b0;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
    }
    #edit-resend-btn:hover { background: #0f3448; }

    /* Tabs */
    #tabs {
      display: flex;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .tab {
      padding: 6px 16px;
      cursor: pointer;
      color: #555;
      font-size: 11px;
      border-bottom: 2px solid transparent;
    }
    .tab:hover { color: #999; }
    .tab.active { color: #d4d4d4; border-bottom-color: #4ec9b0; }

    /* Panes */
    #pane-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .pane {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 12px;
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .pane.active { display: flex; }

    /* Sections within panes */
    .sec-title {
      color: #444;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    .kv-wrap { overflow-x: auto; }
    table.kv {
      width: 100%;
      border-collapse: collapse;
    }
    table.kv td {
      padding: 2px 8px 2px 0;
      vertical-align: top;
      border-bottom: 1px solid #191919;
      font-size: 11px;
    }
    table.kv td.k { color: #9cdcfe; white-space: nowrap; padding-right: 16px; width: 1px; }
    table.kv td.v { color: #d4d4d4; word-break: break-all; }
    .code {
      background: #1a1a1a;
      border: 1px solid #252525;
      border-radius: 4px;
      padding: 8px 10px;
      white-space: pre;
      overflow-x: auto;
      font-size: 11px;
      line-height: 1.55;
      color: #d4d4d4;
    }

    /* Edit pane */
    #pane-edit {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 12px;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #pane-edit.active { display: flex; }
    .el { color: #444; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .edit-row { display: flex; gap: 8px; align-items: stretch; }
    select#e-method, input#e-url, textarea.e-ta {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #d4d4d4;
      font-family: inherit;
      font-size: 11px;
      border-radius: 4px;
      outline: none;
    }
    select#e-method {
      padding: 4px 6px;
      color: #dcdcaa;
      flex-shrink: 0;
    }
    input#e-url {
      flex: 1;
      padding: 4px 8px;
      color: #9cdcfe;
    }
    input#e-url:focus, textarea.e-ta:focus { border-color: #3a3a3a; }
    textarea.e-ta {
      width: 100%;
      padding: 8px;
      line-height: 1.55;
      resize: vertical;
    }
    #send-btn {
      align-self: flex-start;
      background: #0d2e0d;
      border: 1px solid #1a4a1a;
      color: #6db76d;
      padding: 5px 18px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: bold;
    }
    #send-btn:hover { background: #0f3a0f; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #send-result { }
    .res-ok  { color: #6db76d; }
    .res-err { color: #e06c75; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

<div id="toolbar">
  <button id="clear-btn">Clear</button>
  <input id="filter" placeholder="Filter by operation, URL, status…" />
  <label style="display:flex;align-items:center;gap:4px;color:#555;font-size:11px;">
    <input type="checkbox" id="autoscroll" checked style="accent-color:#4ec9b0" /> Auto-scroll
  </label>
  <span id="count">0 requests</span>
</div>

<div id="main">

  <!-- List -->
  <div id="list-panel">
    <div id="list-hdr">
      <span>Method</span><span>Operation</span><span>Status</span><span>Time</span>
    </div>
    <div id="list"></div>
  </div>

  <!-- Detail -->
  <div id="detail-panel">
    <div id="detail-empty">← select a request</div>

    <div id="detail-content" style="display:none">

      <div id="detail-bar">
        <span id="dbar-method" class="mbadge"></span>
        <span id="dbar-url" title=""></span>
        <span id="dbar-status"></span>
        <button id="edit-resend-btn">Edit &amp; Resend</button>
      </div>

      <div id="tabs">
        <div class="tab active" data-tab="req">Request</div>
        <div class="tab" data-tab="res">Response</div>
      </div>

      <div id="pane-area">

        <!-- Request pane -->
        <div class="pane active" id="pane-req">
          <div>
            <div class="sec-title">Headers</div>
            <div class="kv-wrap"><table class="kv" id="req-hdr-tbl"></table></div>
          </div>
          <div id="req-body-sec">
            <div class="sec-title">Body</div>
            <div class="code" id="req-body-code"></div>
          </div>
        </div>

        <!-- Response pane -->
        <div class="pane" id="pane-res">
          <div id="res-pending" style="color:#333">Waiting for response…</div>
          <div id="res-body-wrap" style="display:none">
            <div>
              <div class="sec-title">Headers</div>
              <div class="kv-wrap"><table class="kv" id="res-hdr-tbl"></table></div>
            </div>
            <div id="res-body-sec">
              <div class="sec-title">Body</div>
              <div class="code" id="res-body-code"></div>
            </div>
          </div>
        </div>

        <!-- Edit / resend pane -->
        <div id="pane-edit">
          <div>
            <div class="el">URL</div>
            <div class="edit-row">
              <select id="e-method">
                <option>GET</option><option>POST</option>
                <option>DELETE</option><option>PATCH</option>
              </select>
              <input id="e-url" type="text" spellcheck="false" />
            </div>
          </div>
          <div>
            <div class="el">Request headers — one per line: Key: Value</div>
            <textarea class="e-ta" id="e-headers" rows="10" spellcheck="false"></textarea>
          </div>
          <div>
            <div class="el">Body (JSON)</div>
            <textarea class="e-ta" id="e-body" rows="8" spellcheck="false"></textarea>
          </div>
          <button id="send-btn">Send</button>
          <div id="send-result"></div>
        </div>

      </div><!-- pane-area -->
    </div><!-- detail-content -->
  </div><!-- detail-panel -->

</div><!-- main -->

<script>
  'use strict';
  const { ipcRenderer } = require('electron');

  // ── State ──────────────────────────────────────────────────────────────────
  const reqs      = new Map();   // id → { req, res|null }
  let selectedId  = null;
  let total       = 0;
  let inEditMode  = false;
  let activeTab   = 'req';

  // ── Elements ───────────────────────────────────────────────────────────────
  const listEl         = document.getElementById('list');
  const filterEl       = document.getElementById('filter');
  const countEl        = document.getElementById('count');
  const autoEl         = document.getElementById('autoscroll');
  const detailEmpty    = document.getElementById('detail-empty');
  const detailContent  = document.getElementById('detail-content');

  // ── Toolbar ────────────────────────────────────────────────────────────────
  document.getElementById('clear-btn').onclick = () => {
    reqs.clear(); selectedId = null; total = 0;
    listEl.innerHTML = '';
    countEl.textContent = '0 requests';
    showEmpty();
  };

  filterEl.addEventListener('input', () => {
    const q = filterEl.value.toLowerCase();
    listEl.querySelectorAll('.req-row').forEach(el =>
      el.classList.toggle('hidden', !!q && !el.dataset.text.includes(q))
    );
  });

  // ── IPC ────────────────────────────────────────────────────────────────────
  ipcRenderer.on('http:req', (_e, data) => {
    reqs.set(data.id, { req: data, res: null });
    appendRow(data.id);
    countEl.textContent = `${++total} request${total !== 1 ? 's' : ''}`;
    if (autoEl.checked) listEl.lastElementChild?.scrollIntoView({ block: 'end' });
  });

  ipcRenderer.on('http:res', (_e, data) => {
    const entry = reqs.get(data.id);
    if (!entry) return;
    entry.res = data;
    refreshRow(data.id);
    if (selectedId === data.id) renderDetail(data.id);
  });

  // ── List ───────────────────────────────────────────────────────────────────
  function appendRow(id) {
    const { req } = reqs.get(id);
    const label = req.operationId ?? shortPath(req.url);
    const searchText = `${req.method} ${req.url} ${req.operationId ?? ''}`.toLowerCase();

    const row = document.createElement('div');
    row.className = 'req-row';
    row.id = 'row-' + id;
    row.dataset.text = searchText;
    row.innerHTML = `
      <span class="mbadge m-${req.method}">${req.method}</span>
      <span class="row-op" title="${esc(req.url)}">${esc(label)}</span>
      <span class="row-status s-pending" id="rs-${id}">…</span>
      <span class="row-dur" id="rd-${id}"></span>
    `;
    row.onclick = () => selectRow(id);

    const q = filterEl.value.toLowerCase();
    if (q && !searchText.includes(q)) row.classList.add('hidden');

    listEl.appendChild(row);
  }

  function refreshRow(id) {
    const { res } = reqs.get(id) ?? {};
    if (!res) return;
    const s = document.getElementById('rs-' + id);
    const d = document.getElementById('rd-' + id);
    if (s) { s.className = 'row-status ' + statusCls(res.status); s.textContent = res.status || 'ERR'; }
    if (d) d.textContent = res.durationMs + 'ms';
  }

  function statusCls(code) {
    if (!code) return 's-err';
    if (code >= 500) return 's-5xx';
    if (code >= 400) return 's-4xx';
    if (code >= 300) return 's-3xx';
    if (code >= 200) return 's-2xx';
    return 's-pending';
  }

  function shortPath(url) {
    try { const p = new URL(url).pathname.split('/'); return p.slice(-3).join('/'); }
    catch { return url; }
  }

  // ── Selection ──────────────────────────────────────────────────────────────
  function selectRow(id) {
    document.getElementById('row-' + selectedId)?.classList.remove('selected');
    selectedId = id;
    document.getElementById('row-' + id)?.classList.add('selected');
    exitEditMode(false);
    renderDetail(id);
  }

  function showEmpty() {
    detailEmpty.style.display = '';
    detailContent.style.display = 'none';
  }

  // ── Detail rendering ───────────────────────────────────────────────────────
  function renderDetail(id) {
    const entry = reqs.get(id);
    if (!entry) return;
    const { req, res } = entry;

    detailEmpty.style.display = 'none';
    detailContent.style.display = 'flex';

    // Top bar
    const mEl = document.getElementById('dbar-method');
    mEl.textContent = req.method;
    mEl.className = `mbadge m-${req.method}`;
    const uEl = document.getElementById('dbar-url');
    uEl.textContent = req.url;
    uEl.title = req.url;

    const stEl = document.getElementById('dbar-status');
    if (res) {
      stEl.className = statusCls(res.status);
      stEl.textContent = `${res.status} ${res.statusText}  ${res.durationMs}ms`;
    } else {
      stEl.className = 's-pending';
      stEl.textContent = 'pending…';
    }

    // Request tab
    renderKV(document.getElementById('req-hdr-tbl'), req.headers);
    const reqBodySec = document.getElementById('req-body-sec');
    if (req.body) {
      document.getElementById('req-body-code').textContent = pretty(req.body);
      reqBodySec.style.display = '';
    } else {
      reqBodySec.style.display = 'none';
    }

    // Response tab
    if (res) {
      document.getElementById('res-pending').style.display = 'none';
      document.getElementById('res-body-wrap').style.display = '';
      renderKV(document.getElementById('res-hdr-tbl'), res.headers);
      const resBodySec = document.getElementById('res-body-sec');
      if (res.body) {
        document.getElementById('res-body-code').textContent = pretty(res.body);
        resBodySec.style.display = '';
      } else {
        resBodySec.style.display = 'none';
      }
    } else {
      document.getElementById('res-pending').style.display = '';
      document.getElementById('res-body-wrap').style.display = 'none';
    }
  }

  function renderKV(tableEl, headers) {
    tableEl.innerHTML = '';
    for (const [k, v] of Object.entries(headers ?? {})) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="k">${esc(k)}</td><td class="v">${esc(String(v))}</td>`;
      tableEl.appendChild(tr);
    }
  }

  // ── Tabs ───────────────────────────────────────────────────────────────────
  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab || inEditMode) return;
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('pane-' + activeTab).classList.add('active');
  });

  // ── Edit & Resend ──────────────────────────────────────────────────────────
  const editBtn = document.getElementById('edit-resend-btn');
  editBtn.onclick = () => inEditMode ? exitEditMode(true) : enterEditMode();

  function enterEditMode() {
    if (!selectedId) return;
    inEditMode = true;
    const { req } = reqs.get(selectedId);

    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-edit').classList.add('active');
    editBtn.textContent = '✕ Cancel';

    document.getElementById('e-method').value = req.method;
    document.getElementById('e-url').value    = req.url;
    document.getElementById('e-headers').value = Object.entries(req.headers ?? {})
      .map(([k, v]) => `${k}: ${v}`).join('\n');
    document.getElementById('e-body').value = req.body ? pretty(req.body) : '';
    document.getElementById('send-result').innerHTML = '';
  }

  function exitEditMode(restorePrev = true) {
    inEditMode = false;
    document.getElementById('pane-edit').classList.remove('active');
    editBtn.textContent = 'Edit & Resend';
    if (restorePrev) {
      document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
      document.getElementById('pane-' + activeTab)?.classList.add('active');
    }
  }

  document.getElementById('send-btn').onclick = async () => {
    const method = document.getElementById('e-method').value;
    const url    = document.getElementById('e-url').value.trim();
    const hdrs   = parseHeaders(document.getElementById('e-headers').value);
    const bodyRaw = document.getElementById('e-body').value.trim();

    const btn = document.getElementById('send-btn');
    btn.disabled = true; btn.textContent = 'Sending…';
    document.getElementById('send-result').innerHTML = '';

    try {
      const r = await ipcRenderer.invoke('http:resend', {
        method, url, headers: hdrs,
        body: bodyRaw || undefined,
      });

      let html;
      if (r.error) {
        html = `<div class="sec-title" style="margin-top:8px">Error</div>
                <div class="res-err" style="margin-top:4px">${esc(r.error)}</div>`;
      } else {
        const cls = r.status >= 400 ? 'res-err' : 'res-ok';
        html = `<div class="sec-title" style="margin-top:8px">
                  Response — <span class="${cls}">${r.status} ${esc(r.statusText)}</span>
                  &nbsp;${r.durationMs}ms
                </div>`;
        if (r.body) {
          html += `<div class="code" style="margin-top:6px">${esc(pretty(r.body))}</div>`;
        }
      }
      document.getElementById('send-result').innerHTML = html;
    } catch (err) {
      document.getElementById('send-result').innerHTML =
        `<div class="res-err">${esc(String(err))}</div>`;
    } finally {
      btn.disabled = false; btn.textContent = 'Send';
    }
  };

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function pretty(s) {
    if (!s) return '';
    try { return JSON.stringify(JSON.parse(s), null, 2); }
    catch { return s; }
  }

  function parseHeaders(raw) {
    const out = {};
    for (const line of raw.split('\n')) {
      const idx = line.indexOf(':');
      if (idx < 0) continue;
      const k = line.slice(0, idx).trim();
      const v = line.slice(idx + 1).trim();
      if (k) out[k] = v;
    }
    return out;
  }
</script>
</body>
</html>
